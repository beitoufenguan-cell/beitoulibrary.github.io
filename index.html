<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BEITOU ARCHIVE</title>

<style>

body{
margin:0;
background:#d9d9d9;
font-family:Arial,sans-serif;
color:#222;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.title{
font-size:56px;
font-weight:900;
letter-spacing:2px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
opacity:0.6;
margin-bottom:50px;
}

.card{
background:white;
border-radius:24px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.card img{
width:100%;
border-radius:16px;
}

.card-title{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

.card-text{
line-height:1.8;

.button{
display:inline-block;
margin-top:20px;
padding:14px 24px;

.footer{
margin-top:60px;
opacity:0.4;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
BEITOU ARCHIVE
</div>

<div class="subtitle">
北投末日生物研究所
</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1200&auto=format&fit=crop">

<div class="card-title">
提交新的觀測紀錄
</div>

<div class="card-text">
掃描你的末日生物卡，加入北投世界終點檔案庫。<br>
每一個生物，都是文明崩壞後留下的新生命。
</div>

<a class="button" href="#">
開始掃描
</a>

</div>

<div class="footer">
Taipei Public Library Beitou Branch
</div>

</div>
